<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skip | Chat with your friends</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="auth-section">
        <h2>Welcome to Skip</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn">Register</button>
    </div>

    <div id="app-container" style="display: none;">
        
        <div id="server-sidebar">
            <div class="server-icon" id="home-btn" title="Direct Messages">💬</div>
            <div id="server-list"></div>
            <div class="server-icon" id="create-server-btn" title="Create Server">+</div>
            <div class="server-icon" id="join-server-btn" title="Join Server">🌍</div>
        </div>

        <div id="channel-sidebar">
            <div id="sidebar-header">
                <h3 id="server-name-display">Friends & DMs</h3>
                <button id="add-friend-btn" class="small-btn">+ Friend</button>
                <button id="create-channel-btn" class="small-btn" style="display: none;">+ Text</button>
                <button id="create-voice-btn" class="small-btn" style="display: none;">+ Voice</button>
            </div>
            
            <div id="channel-list"></div>
            
            <div id="voice-area" style="display: none;">
                <div id="voice-status">🎙️ Connected to Voice</div>
                <div id="voice-users-list"></div>
                <div id="voice-controls">
                    <button id="mute-btn" class="vc-btn" title="Mute Microphone">🎤</button>
                    <button id="deafen-btn" class="vc-btn" title="Deafen Audio">🎧</button>
                    <button id="disconnect-vc-btn" class="vc-btn" title="Disconnect" style="color: #ed4245;">❌</button>
                </div>
            </div>

            <div id="user-controls" title="Click to edit profile">
                <div class="avatar-container">
                    <img id="my-avatar" class="avatar-small" src="" alt="Me">
                    <div id="my-status-indicator" class="status-indicator status-online" title="Change Status"></div>
                </div>
                <div id="user-info">
                    <div id="user-display" style="font-weight: bold;">User</div>
                    <div id="user-tag-display" style="font-size: 12px; color: gray;">#0000</div>
                </div>
                <button id="logout-btn" class="small-btn">Log Out</button>

                <div id="status-selector" style="display:none;">
                    <div class="status-option" data-status="online">🟢 Online</div>
                    <div class="status-option" data-status="idle">🌙 Idle</div>
                    <div class="status-option" data-status="dnd">🔴 Do Not Disturb</div>
                    <div class="status-option" data-status="offline">⚪ Invisible</div>
                </div>
            </div>
        </div>

        <div id="chat-area">
            <div id="chat-header">
                <button id="mobile-back-btn" class="small-btn">⬅</button>
                <span id="chat-title">Select a chat to start messaging</span>
                <span id="invite-code-display" style="font-size: 12px; color: gray; margin-left: 15px; user-select: all; cursor: pointer;"></span>
            </div>
            <div id="messages"></div>
            <div id="message-input-area">
                <button id="upload-img-btn" disabled title="Send Image">📷</button>
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <input type="text" id="msg-input" placeholder="Message..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" style="display: none;">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <img id="profile-preview" class="avatar-large" src="https://cdn.pixabay.com/photo/2023/02/18/11/00/icon-7797704_640.png" alt="Avatar">
                <input type="file" id="avatar-upload" accept="image/*">
            </div>
            <label>Username</label>
            <input type="text" id="edit-username" placeholder="Username">
            <label>Tag (4 digits)</label>
            <input type="number" id="edit-tag" placeholder="6996">
            <div style="margin-top: 15px;">
                <button id="save-profile-btn">Save Changes</button>
                <button id="close-profile-btn" style="background-color: #ed4245;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="image-modal" style="display: none;">
        <div id="close-image-modal">&times;</div>
        <img id="enlarged-image" src="" alt="Enlarged">
        <a id="download-image-btn" href="" download="image.png">⬇ Download Image</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
