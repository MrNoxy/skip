<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Discord Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section">
        <h2>Welcome to the Clone</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn">Register</button>
    </div>

    <div id="app-container" style="display: none;">
        
        <div id="server-sidebar">
            <div class="server-icon" id="home-btn" title="Friends & DMs">🏠</div>
            <div id="server-list"></div>
            <div class="server-icon" id="create-server-btn" title="Create Server">+</div>
            <div class="server-icon" id="join-server-btn" title="Join Server">🔗</div>
        </div>

        <div id="channel-sidebar">
            <div id="sidebar-header">
                <h3 id="server-name-display">Friends & DMs</h3>
                <button id="add-friend-btn" class="small-btn">+ Friend</button>
                <button id="create-channel-btn" class="small-btn" style="display: none;">+ Channel</button>
            </div>
            
            <div id="channel-list">
                </div>
            
            <div id="user-controls" title="Click to edit profile">
                <img id="my-avatar" class="avatar-small" src="https://cdn.pixabay.com/photo/2023/02/18/11/00/icon-7797704_640.png" alt="Me">
                <div id="user-info">
                    <div id="user-display" style="font-weight: bold;">User</div>
                    <div id="user-tag-display" style="font-size: 12px; color: gray;">#0000</div>
                </div>
                <button id="logout-btn" class="small-btn">Log Out</button>
            </div>
        </div>

        <div id="chat-area">
            <div id="chat-header">
                <span id="chat-title">Select a chat to start messaging</span>
                <span id="invite-code-display" style="font-size: 12px; color: gray; margin-left: 15px; user-select: all; cursor: pointer;"></span>
            </div>
            <div id="messages"></div>
            <div id="message-input-area">
                <input type="text" id="msg-input" placeholder="Message..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" style="display: none;">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <img id="profile-preview" class="avatar-large" src="https://cdn.pixabay.com/photo/2023/02/18/11/00/icon-7797704_640.png" alt="Avatar">
                <input type="file" id="avatar-upload" accept="image/*">
            </div>
            <label>Username</label>
            <input type="text" id="edit-username" placeholder="Username">
            <label>Tag (4 digits)</label>
            <input type="number" id="edit-tag" placeholder="6996">
            <div style="margin-top: 15px;">
                <button id="save-profile-btn">Save Changes</button>
                <button id="close-profile-btn" style="background-color: #ed4245;">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
